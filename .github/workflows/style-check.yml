name: Style check

# Runs the house style rules from CONTRIBUTING.md section 3 on every PR,
# so contributors get told what is wrong without waiting on a manual review.
# The script skips "02 - Deep Dives" and .remember/, see CLAUDE.md.

on:
  pull_request:
    paths:
      - '**.md'
  push:
    branches: [main]
    paths:
      - '**.md'
  workflow_dispatch:

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run style check
        run: bash .claude/scripts/check-style.sh
